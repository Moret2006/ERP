<header class="topbar">
    <div class="topbar__left">
        <button type="button" class="topbar__menu-btn" id="sidebar-open" aria-label="Abrir menu">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
        </button>

        <div class="search-box">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/>
                <path d="M20 20l-3.5-3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            <input
                type="search"
                id="global-search"
                name="q"
                placeholder="Buscar (pedidos, clientes, produtos...)"
                autocomplete="off"
                aria-label="Buscar pedidos, clientes e produtos"
            >
        </div>
    </div>

    <div class="topbar__actions">
        <button type="button" class="icon-btn" id="notifications-btn" aria-label="Notificações">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M15 17H9c-2.2 0-4-1.8-4-4V9a7 7 0 1114 0v4c0 2.2-1.8 4-4 4z" stroke="currentColor" stroke-width="1.8"/>
                <path d="M10 19a2 2 0 004 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
        </button>

        <div class="user-menu" id="user-menu">
            <button type="button" class="user-menu__toggle" id="user-menu-toggle" aria-expanded="false" aria-haspopup="true">
                <span class="user-avatar">{{ display_name|slice:":1" }}</span>
                <span class="user-info">
                    <strong>{{ display_name }}</strong>
                    <span>{{ user_role }}</span>
                </span>
                <svg class="user-menu__chevron" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
            </button>
            <div class="user-menu__dropdown" id="user-menu-dropdown" hidden>
                <a href="{% url 'logout' %}" class="user-menu__item">Sair da conta</a>
            </div>
        </div>
    </div>
</header>
