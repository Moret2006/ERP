{% load static %}
<aside class="sidebar" id="sidebar" aria-label="Menu principal">
    <div class="sidebar__header">
        <button type="button" class="sidebar__close" id="sidebar-close" aria-label="Fechar menu">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
        </button>
        <a href="{% url 'dash' %}" class="sidebar__logo">
            <img src="{% static 'login/img/logo.png' %}" alt="Ateliê dos Balões">
        </a>
    </div>

    <nav class="sidebar__nav">
        <a href="{% url 'dash' %}" class="nav-item{% if active_nav == 'dashboard' %} is-active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/><rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/><rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/></svg>
            <span>Dashboard</span>
        </a>
        <a href="{% url 'pedidos:list' %}" class="nav-item{% if active_nav == 'pedidos' %} is-active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M6 6h15l-1.5 9H7.5L6 6z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><circle cx="9" cy="19" r="1.5" fill="currentColor"/><circle cx="17" cy="19" r="1.5" fill="currentColor"/></svg>
            <span>Pedidos</span>
        </a>
        <a href="#" class="nav-item{% if active_nav == 'orcamentos' %} is-active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M7 3h10v18l-5-3-5 3V3z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
            <span>Orçamentos</span>
        </a>
        <a href="{% url 'pedidos:clientes_list' %}" class="nav-item{% if active_nav == 'clientes' %} is-active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/><path d="M4 20c0-3.3 3.6-6 8-6s8 2.7 8 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            <span>Clientes</span>
        </a>
        <a href="{% url 'pedidos:produtos_list' %}" class="nav-item{% if active_nav == 'produtos' %} is-active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 3l8 4v6c0 4.4-3.6 8-8 8s-8-3.6-8-8V7l8-4z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
            <span>Produtos</span>
        </a>
        <a href="#" class="nav-item{% if active_nav == 'financeiro' %} is-active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 3v18M7 8h10M7 13h7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            <span>Financeiro</span>
        </a>
        <a href="#" class="nav-item{% if active_nav == 'caixa' %} is-active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><rect x="3" y="6" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M7 10h4M7 14h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            <span>Caixa</span>
        </a>
        <a href="#" class="nav-item{% if active_nav == 'fornecedores' %} is-active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M3 9l9-6 9 6v10a1 1 0 01-1 1H4a1 1 0 01-1-1V9z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><rect x="9" y="13" width="6" height="7" stroke="currentColor" stroke-width="1.8"/></svg>
            <span>Fornecedores</span>
        </a>
        <a href="#" class="nav-item{% if active_nav == 'relatorios' %} is-active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 19V5M4 19h16M8 15l3-3 3 2 4-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>Relatórios</span>
        </a>
        <a href="#" class="nav-item{% if active_nav == 'configuracoes' %} is-active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            <span>Configurações</span>
        </a>
    </nav>

    <div class="sidebar__promo">
        <p class="sidebar__promo-title">Ateliê dos Balões</p>
        <p class="sidebar__promo-text">Transformando momentos em memórias!</p>
        <span class="sidebar__promo-icon" aria-hidden="true">🎈</span>
    </div>
</aside>
<div class="sidebar-overlay" id="sidebar-overlay" hidden></div>
