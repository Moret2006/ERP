{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Ateliê dos Balões</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'login/css/login.css' %}">
</head>
<body>
    <div class="background">
        <div class="bg-wave"></div>
        <div class="bg-balloon bg-balloon--pink"></div>
        <div class="bg-balloon bg-balloon--blue"></div>
        <div class="bg-heart"></div>
        <div class="bg-dots"></div>
        <div class="bg-clouds"></div>
    </div>

    <main class="login-page">
        <div class="login-card">
            <div class="logo-badge">
                <img src="{% static 'login/img/logo.png' %}" alt="Logo Ateliê dos Balões" class="logo-image">
            </div>

            <div class="login-content">
                <h1 class="greeting">Bem-vindo(a)! <span class="balloon">🎈</span></h1>
                <p class="subtitle">Faça login para acessar sua conta</p>

                {% if messages %}
                <div class="alert" role="alert">
                    {% for message in messages %}
                    <p>{{ message }}</p>
                    {% endfor %}
                </div>
                {% endif %}

                <form method="post" action="{% url 'login' %}{% if next %}?next={{ next|urlencode }}{% endif %}" class="login-form" novalidate>
                    {% csrf_token %}
                    {% if next %}
                    <input type="hidden" name="next" value="{{ next }}">
                    {% endif %}

                    <div class="form-group">
                        <label for="email">Usuário ou e-mail</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                <path d="M4 6h16v12H4V6zm0 0l8 6 8-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            <input
                                type="text"
                                id="email"
                                name="email"
                                placeholder="Digite seu usuário ou e-mail"
                                required
                                autocomplete="username"
                                value="{{ request.POST.email|default:'' }}"
                            >
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Senha</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                <rect x="5" y="11" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.8"/>
                                <path d="M8 11V8a4 4 0 118 0v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                            </svg>
                            <input
                                type="password"
                                id="password"
                                name="password"
                                placeholder="Digite sua senha"
                                required
                                autocomplete="current-password"
                            >
                            <button type="button" class="toggle-password" aria-label="Mostrar senha" data-target="password">
                                <svg class="eye-icon eye-open" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                    <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z" stroke="currentColor" stroke-width="1.8"/>
                                    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
                                </svg>
                                <svg class="eye-icon eye-closed" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                    <path d="M3 3l18 18M10.6 10.6A3 3 0 0012 15a3 3 0 002.4-4.4M6.2 6.2C4.4 7.5 2.9 9.4 2 12c0 0 3.5 7 10 7 1.8 0 3.4-.4 4.8-1.1M17.8 17.8C19.6 16.5 21.1 14.6 22 12c0 0-3.5-7-10-7-1.1 0-2.1.2-3 .5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" name="remember" value="1">
                            <span>Lembrar-me</span>
                        </label>
                        <a href="#" class="forgot-link" id="forgot-password">Esqueci minha senha</a>
                    </div>

                    <button type="submit" class="btn btn-primary">Entrar</button>

                    <div class="divider"><span>ou</span></div>

                    <button type="button" class="btn btn-secondary" id="clear-form">
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/>
                            <path d="M4 20c0-3.3 3.6-6 8-6s8 2.7 8 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                            <path d="M19 8v4M21 10h-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        </svg>
                        Acessar com outra conta
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script src="{% static 'login/js/login.js' %}"></script>
</body>
</html>
